# High Performance Feed App 🚀

## 📌 Overview
This is a high-performance Instagram-like feed app built using Flutter and Supabase. It focuses on smooth scrolling, optimized image loading, and efficient backend integration.

---

## ✨ Features
- Infinite scrolling feed
- Pull-to-refresh
- Optimistic like/unlike UI
- Detail screen with Hero animation
- High-resolution image viewing
- Image caching using CachedNetworkImage
- Backend integration with Supabase
- Python-based image processing pipeline

---

## 🛠️ Tech Stack
- Flutter
- Riverpod
- Supabase (Database + Storage)
- Python (Pillow)

---

## ⚡ Performance Optimizations

### 🔹 RepaintBoundary
Used to reduce unnecessary UI repainting and improve scroll performance.

### 🔹 memCacheWidth
Reduces memory usage by loading optimized image sizes.

### 🔹 Tiered Image Loading
- Thumbnail → Feed
- Mobile → Detail screen
- Raw → High-res view

---

## 🐍 Python Pipeline
- Converts images into multiple sizes
- Uploads to Supabase Storage
- Inserts URLs into database

